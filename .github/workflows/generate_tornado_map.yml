name: Generate Tornado Probability Map

on:
  # Run every 6 hours aligned with HRRR model cycles
  schedule:
    - cron: "30 0,6,12,18 * * *"   # 30 min after 00/06/12/18 UTC cycles
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      run_time:
        description: "HRRR run time (UTC) e.g. '2024-05-15 18:00' – leave blank for latest"
        required: false
        default: ""

jobs:
  generate:
    name: Compute & publish tornado probability map
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push updated maps/ to gh-pages

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      - name: Determine run time
        id: rt
        run: |
          if [ -n "${{ github.event.inputs.run_time }}" ]; then
            echo "run_time=${{ github.event.inputs.run_time }}" >> $GITHUB_OUTPUT
          else
            # Use previous 6-hour cycle to ensure data is available
            python - <<'EOF'
          from datetime import datetime, timezone, timedelta
          now = datetime.now(timezone.utc)
          cycle_hour = (now.hour // 6) * 6
          run = now.replace(hour=cycle_hour, minute=0, second=0, microsecond=0)
          # Step back one cycle if only ~30 min have elapsed since cycle start
          if (now - run).total_seconds() < 1800:
              run -= timedelta(hours=6)
          print(f"run_time={run.strftime('%Y-%m-%d %H:00')}")
          EOF
          fi

      # -----------------------------------------------------------------------
      - name: Generate tornado probability map
        run: |
          python generate_map.py \
            --run-time "${{ steps.rt.outputs.run_time }}" \
            --output-dir maps

      # -----------------------------------------------------------------------
      - name: Update map archive index
        run: |
          python update_index.py

      # -----------------------------------------------------------------------
      - name: Commit and push maps
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maps/ index.html
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Auto: tornado probability map $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD
