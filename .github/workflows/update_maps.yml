name: Generate Severe Weather Probability Maps (HRRR / RRFS / NAM / NSSL-MPAS / Combined)

on:
  # Run every hour at :10 past the hour
  schedule:
    - cron: "10 * * * *"
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      run_time:
        description: "Model init time (UTC) — e.g. '2025-05-01 18'. Leave blank for latest."
        required: false
        default: ""
      hours:
        description: "Forecast hours to generate (1–6)"
        required: false
        default: "6"
      region:
        description: "Map region: 'conus' for full CONUS, 'northeast' for Northeast US only"
        required: false
        default: "conus"
        type: choice
        options:
          - conus
          - northeast
      model:
        description: "Model: hrrr | rrfs | nam | nssl-mpas | combined (combined generates all + ensemble)"
        required: false
        default: "combined"
        type: choice
        options:
          - combined
          - hrrr
          - rrfs
          - nam
          - nssl-mpas
  # Re-run when the script or requirements change on main
  push:
    branches:
      - main
    paths:
      - "generate_map.py"
      - "requirements.txt"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # -----------------------------------------------------------------------
  generate-maps:
  # -----------------------------------------------------------------------
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate severe weather probability maps
        run: |
          RUN_TIME="${{ github.event.inputs.run_time }}"
          HOURS="${{ github.event.inputs.hours }}"
          REGION="${{ github.event.inputs.region }}"
          MODEL="${{ github.event.inputs.model }}"

          # Apply defaults for scheduled / push triggers
          HOURS="${HOURS:-6}"
          REGION="${REGION:-conus}"
          MODEL="${MODEL:-combined}"

          ARGS="--hours ${HOURS} --model ${MODEL}"

          if [ -n "${RUN_TIME// /}" ]; then
            ARGS="$ARGS --run-time \"$RUN_TIME\""
          fi
          if [ "${REGION}" = "conus" ]; then
            ARGS="$ARGS --conus"
          fi

          echo "Running: python generate_map.py $ARGS"
          eval python generate_map.py $ARGS

      - name: Commit and push updated maps
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/maps/ docs/latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update severe weather probability maps (HRRR+RRFS+NAM+MPAS) [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  # -----------------------------------------------------------------------
  deploy-pages:
  # -----------------------------------------------------------------------
    needs: generate-maps
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
